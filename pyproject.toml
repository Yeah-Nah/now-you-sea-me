# Tool configurations for the entire repository
# Package metadata is in oakd-camera-tracking/pyproject.toml

# Ruff linter configuration
[tool.ruff]
# Set the maximum line length to 88 (Black's default)
line-length = 88

# Assume Python 3.13+
target-version = "py313"

# Exclude common directories from linting
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    "mlruns",
]

# Enable these rule sets
[tool.ruff.lint]
select = [
    "A",      # flake8-builtins
    "B",      # flake8-bugbear (find likely bugs)
    "C4",     # flake8-comprehensions
    "COM",    # flake8-commas
    "D",      # pydocstyle (docstring conventions)
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade (modernize Python code)
    "Q",      # flake8-quotes
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
]

# Allow unused variables when they start with an underscore
ignore = [
    "E501",   # Line too long (handled by formatter)
    "COM812"
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.pydocstyle]
convention = "numpy"

# Ruff formatter configuration (Black-compatible)
[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Respect magic trailing commas
skip-magic-trailing-comma = false

# Automatically detect line endings
line-ending = "auto"

# pytest configuration
[tool.pytest.ini_options]
testpaths = ["oakd-camera-tracking/tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --strict-markers"

# MyPy type checker configuration
[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Set to true once you add type hints
ignore_missing_imports = true  # Useful when dependencies don't have type stubs
